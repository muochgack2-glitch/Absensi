<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Modal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/modern-utilities.css">
    <style>
        body {
            padding: 50px;
        }
    </style>
</head>
<body>
    <h1>Test Modal System</h1>
    
    <form id="testForm" action="https://httpbin.org/post" method="POST">
        <input type="hidden" name="test" value="data">
        <button type="submit" class="btn btn-danger">Submit Form (with Modal)</button>
    </form>
    
    <div class="mt-3">
        <button type="button" id="testBtn" class="btn btn-primary">Test Modal.confirm</button>
    </div>

    <div class="mt-3">
        <h3>Console Output:</h3>
        <div id="console" style="background: #f5f5f5; padding: 10px; border-radius: 5px; font-family: monospace;"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/modal.js"></script>
    
    <script>
        const consoleDiv = document.getElementById('console');
        
        function log(message) {
            console.log(message);
            consoleDiv.innerHTML += message + '<br>';
        }
        
        // Test button
        document.getElementById('testBtn').addEventListener('click', function() {
            log('Test button clicked');
            
            Modal.confirm(
                'This is a test message',
                function() {
                    log('Callback executed!');
                    alert('Callback executed!');
                },
                {
                    title: 'Test Modal',
                    confirmText: 'Yes',
                    cancelText: 'No',
                    type: 'warning'
                }
            );
        });
        
        // Form submit
        const form = document.getElementById('testForm');
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            e.stopImmediatePropagation();
            
            log('Form submit prevented');
            
            Modal.confirm(
                'Do you want to submit this form?',
                function() {
                    log('Confirmed! Submitting form...');
                    HTMLFormElement.prototype.submit.call(form);
                },
                {
                    title: 'Confirm Submit',
                    confirmText: 'Yes, Submit',
                    cancelText: 'Cancel',
                    type: 'danger'
                }
            );
            
            return false;
        });
        
        log('Page loaded. Modal object: ' + (typeof Modal));
        log('Modal.confirm: ' + (typeof Modal.confirm));
    </script>
</body>
</html>
